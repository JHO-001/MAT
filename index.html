<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAT GitHub Pages</title>
  <style>
    body { font-family: system-ui, sans-serif; line-height: 1.6; padding: 2rem; background: #f7fafc; color: #1a202c; }
    main { max-width: 720px; margin: 0 auto; background: #ffffff; border-radius: 16px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); padding: 2rem; }
    h1 { margin-bottom: 0.5rem; color: #2b6cb0; }
    p { margin-bottom: 1rem; }
    a { color: #2b6cb0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #edf2f7; padding: 0.2rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>MAT GitHub Pages</h1>
    <p>這是你專案 <strong>JHO-001/MAT</strong> 的 GitHub Pages 首頁。</p>
    <p>要讓它發佈成網站，請在 GitHub 頁面中啟用 Pages，選擇：</p>
    <ul>
      <li><code>Branch</code>: <strong>main</strong></li>
      <li><code>Folder</code>: <strong>/(root)</strong></li>
    </ul>
    <p>啟用後，網址通常會是：</p>
    <p><a href="https://jho-001.github.io/MAT" target="_blank">https://jho-001.github.io/MAT</a></p>
  </main>
</body>
</html>
